{% extends 'base.html' %}

{% block title %}Реєстрація{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-body p-4">
                    <h1 class="fw-bold mb-4 text-center">Реєстрація</h1>
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-primary w-100 mt-2">Зареєструватись</button>
                    </form>
                    <p class="text-center mt-3 text-muted">
                        Вже є акаунт? <a href="{% url 'login' %}">Увійти</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
{% endblock %}

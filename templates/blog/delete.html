{% extends 'base.html' %}

{% block title %}Видалити пост{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body p-4 text-center">
                    <h1 class="fw-bold mb-3">Видалити пост</h1>
                    <p class="text-muted">Ти впевнений що хочеш видалити</p>
                    <p class="fw-bold">"{{ post.title }}"?</p>
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger me-2">Так, видалити</button>
                        <a href="{% url 'post_detail' post.pk %}" class="btn btn-outline-secondary">Скасувати</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}

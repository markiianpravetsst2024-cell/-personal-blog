{% extends 'base.html' %}

{% block title %}{% if post %}Редагувати пост{% else %}Створити пост{% endif %}{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-body p-4">
                    <h1 class="fw-bold mb-4">
                        {% if post %}Редагувати пост{% else %}Створити пост{% endif %}
                    </h1>
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-primary mt-3">Зберегти</button>
                        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary mt-3 ms-2">Скасувати</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}

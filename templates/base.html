<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Personal Blog{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --accent: #198754; }
        body { background: #f8f9fa; }
        .navbar { background: #fff !important; border-bottom: 2px solid var(--accent); }
        .navbar-brand { color: var(--accent) !important; font-weight: 700; font-size: 1.4rem; }
        .nav-link { color: #333 !important; }
        .nav-link:hover { color: var(--accent) !important; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); transition: transform 0.2s; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
        .btn-primary { background: var(--accent); border-color: var(--accent); }
        .btn-primary:hover { background: #146c43; border-color: #146c43; }
        .badge-status { background: var(--accent); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">✍️ Personal Blog</a>
            <div class="navbar-nav ms-auto align-items-center">
                {% if user.is_authenticated %}
                    <span class="me-3 text-muted">👤 {{ user.username }}</span>
                    <a class="nav-link" href="{% url 'dashboard' %}">Кабінет</a>
                    <a class="btn btn-outline-success btn-sm ms-2" href="{% url 'logout' %}">Вийти</a>
                {% else %}
                    <a class="nav-link" href="{% url 'login' %}">Увійти</a>
                    <a class="btn btn-success btn-sm ms-2" href="{% url 'register' %}">Реєстрація</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-success alert-dismissible fade show">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <footer class="text-center text-muted py-4 mt-5 border-top">
        <small>Personal Blog © 2024</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
